<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-label="Northwind Brew brand system card">
  <rect width="900" height="540" rx="34" fill="#fff7e8"/>
  <text x="58" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="4" fill="#6b8b65" font-weight="700">BRAND SYSTEM</text>
  <text x="58" y="132" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#2d1b13">Northwind Brew</text>
  <text x="58" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#6f3f25">Warm neighborhood coffee, polished for a modern landing page.</text>
  <g transform="translate(58 230)">
    <rect width="136" height="136" rx="22" fill="#2d1b13"/>
    <rect x="160" width="136" height="136" rx="22" fill="#6f3f25"/>
    <rect x="320" width="136" height="136" rx="22" fill="#d9a55d"/>
    <rect x="480" width="136" height="136" rx="22" fill="#6b8b65"/>
    <rect x="640" width="136" height="136" rx="22" fill="#fff0d4" stroke="#d8b06e"/>
    <text x="0" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#2d1b13">Espresso</text>
    <text x="160" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#2d1b13">Roast</text>
    <text x="320" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#2d1b13">Amber</text>
    <text x="480" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#2d1b13">Sage</text>
    <text x="640" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#2d1b13">Cream</text>
  </g>
  <g transform="translate(58 458)">
    <rect width="230" height="46" rx="23" fill="#2d1b13"/>
    <text x="115" y="30" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff7e8">Join the launch list</text>
    <text x="320" y="29" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#2d1b13">Start your morning close to home.</text>
  </g>
</svg>

