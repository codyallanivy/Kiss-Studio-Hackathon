<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Northwind Brew hero composition">
  <defs>
    <linearGradient id="heroBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset=".58" stop-color="#f3d7a5"/>
      <stop offset="1" stop-color="#b6814b"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#2a1a12" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="36" fill="url(#heroBg)"/>
  <circle cx="760" cy="134" r="155" fill="#fff0d4" opacity=".7"/>
  <circle cx="132" cy="460" r="220" fill="#6b8b65" opacity=".18"/>
  <g transform="translate(92 92)">
    <text x="0" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="4" fill="#6b8b65" font-weight="700">LOCAL ROASTERY</text>
    <text x="0" y="126" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#2d1b13">Start your morning</text>
    <text x="0" y="198" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#2d1b13">close to home.</text>
    <text x="0" y="252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#5f4937">Small-batch coffee, a calm place to work,</text>
    <text x="0" y="282" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#5f4937">and a launch list for neighbors.</text>
    <rect x="0" y="326" width="190" height="56" rx="28" fill="#2d1b13"/>
    <text x="95" y="362" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff7e8">Join the list</text>
  </g>
  <g transform="translate(610 150)" filter="url(#softShadow)">
